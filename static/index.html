<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pronunciation Coach</title>
<style>
  :root {
    --bg: #0b0f19;
    --bg-2: #121829;
    --card: #161d31;
    --card-border: #232c45;
    --text: #e8ecf6;
    --muted: #8b93a7;
    --accent: #6366f1;
    --accent-2: #818cf8;
    --green: #22c55e;
    --yellow: #eab308;
    --orange: #f97316;
    --red: #ef4444;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(99, 102, 241, 0.18), transparent),
      radial-gradient(900px 500px at 0% 110%, rgba(129, 140, 248, 0.12), transparent),
      var(--bg);
    color: var(--text);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: linear-gradient(180deg, var(--card), var(--bg-2));
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 36px 32px 40px;
    box-shadow: var(--shadow);
  }

  .header { text-align: center; margin-bottom: 28px; }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header p {
    color: var(--muted);
    font-size: 13.5px;
    margin-top: 6px;
  }

  .controls { display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  select, input[type="text"] {
    width: 100%;
    background: #0e1424;
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
  }

  .record-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin: 8px 0 6px;
  }

  .rec-btn {
    position: relative;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(145deg, var(--accent-2), var(--accent));
    box-shadow: 0 12px 30px rgba(99, 102, 241, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s ease, background 0.2s;
  }
  .rec-btn:hover { transform: translateY(-2px); }
  .rec-btn:active { transform: scale(0.96); }
  .rec-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .rec-icon {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #fff;
    transition: all 0.2s ease;
  }
  .rec-btn.recording { background: linear-gradient(145deg, #f87171, var(--red)); }
  .rec-btn.recording .rec-icon {
    width: 26px; height: 26px;
    border-radius: 6px;
  }

  /* pulsing ring while recording */
  .rec-btn.recording::before,
  .rec-btn.recording::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(239, 68, 68, 0.6);
    animation: pulse 1.6s ease-out infinite;
  }
  .rec-btn.recording::after { animation-delay: 0.8s; }
  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.9; }
    100% { transform: scale(1.9); opacity: 0; }
  }

  .hint { color: var(--muted); font-size: 13px; min-height: 18px; text-align: center; }

  /* loading */
  .loading { display: none; flex-direction: column; align-items: center; gap: 14px; margin-top: 26px; }
  .loading.show { display: flex; }
  .spinner {
    width: 34px; height: 34px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* result */
  .result { display: none; margin-top: 30px; text-align: center; animation: fadeUp 0.4s ease; }
  .result.show { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ring-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 8px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { stroke: #212a42; }
  .ring-fg { transition: stroke-dashoffset 1s cubic-bezier(0.22, 1, 0.36, 1); stroke-linecap: round; }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-num { font-size: 46px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .score-pct { font-size: 15px; color: var(--muted); margin-top: 2px; }

  .verdict {
    display: inline-block;
    margin-top: 6px;
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    text-transform: capitalize;
    letter-spacing: 0.02em;
  }

  .phonemes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 24px;
    text-align: left;
  }
  .ph-box {
    background: #0e1424;
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .ph-box .ph-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .ph-box .ph-val {
    font-family: "SFMono-Regular", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
    font-size: 16px;
    color: var(--text);
    word-break: break-word;
    line-height: 1.5;
  }

  .error {
    display: none;
    margin-top: 22px;
    padding: 14px 16px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.35);
    border-radius: 12px;
    color: #fca5a5;
    font-size: 14px;
    text-align: center;
  }
  .error.show { display: block; }

  .footer { text-align: center; margin-top: 26px; color: var(--muted); font-size: 11.5px; }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🎙️ Pronunciation Coach</h1>
      <p>Record a word and get an instant accuracy score</p>
    </div>

    <div class="controls">
      <div>
        <label for="language">Language</label>
        <select id="language"></select>
      </div>
      <div>
        <label for="word">Word to practice</label>
        <input type="text" id="word" value="hello" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div class="record-wrap">
      <button class="rec-btn" id="recBtn" aria-label="Record">
        <span class="rec-icon"></span>
      </button>
      <div class="hint" id="hint">Tap to record</div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="hint">Analyzing your pronunciation…</div>
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="ring-wrap">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle class="ring-bg" cx="90" cy="90" r="80" fill="none" stroke-width="14" />
          <circle class="ring-fg" id="ringFg" cx="90" cy="90" r="80" fill="none" stroke-width="14"
                  stroke-dasharray="502.65" stroke-dashoffset="502.65" />
        </svg>
        <div class="ring-center">
          <div class="score-num" id="scoreNum">0</div>
          <div class="score-pct">out of 100</div>
        </div>
      </div>
      <span class="verdict" id="verdict"></span>

      <div class="phonemes">
        <div class="ph-box">
          <div class="ph-label">You said</div>
          <div class="ph-val" id="predPh">—</div>
        </div>
        <div class="ph-box">
          <div class="ph-label">Target</div>
          <div class="ph-val" id="refPh">—</div>
        </div>
      </div>
    </div>

    <div class="footer">Offline · wav2vec2 + espeak-ng · open source</div>
  </div>

<script>
  const API = ""; // same origin

  const COLORS = {
    excellent: getVar("--green"),
    good:      getVar("--yellow"),
    fair:      getVar("--orange"),
    poor:      getVar("--red"),
  };
  function getVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  const CIRC = 2 * Math.PI * 80; // ring circumference

  const els = {
    lang: document.getElementById("language"),
    word: document.getElementById("word"),
    recBtn: document.getElementById("recBtn"),
    hint: document.getElementById("hint"),
    loading: document.getElementById("loading"),
    error: document.getElementById("error"),
    result: document.getElementById("result"),
    ringFg: document.getElementById("ringFg"),
    scoreNum: document.getElementById("scoreNum"),
    verdict: document.getElementById("verdict"),
    predPh: document.getElementById("predPh"),
    refPh: document.getElementById("refPh"),
  };

  let mediaRecorder = null;
  let chunks = [];
  let recording = false;

  // Load languages from the API
  async function loadLanguages() {
    try {
      const res = await fetch(API + "/languages");
      const data = await res.json();
      els.lang.innerHTML = "";
      data.languages.forEach((l) => {
        const opt = document.createElement("option");
        opt.value = l.code;
        opt.textContent = l.name;
        els.lang.appendChild(opt);
      });
    } catch (e) {
      // fallback single option
      els.lang.innerHTML = '<option value="en-us">English (US)</option>';
    }
  }

  els.recBtn.addEventListener("click", async () => {
    if (recording) {
      stopRecording();
    } else {
      await startRecording();
    }
  });

  async function startRecording() {
    hideError();
    hideResult();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach((t) => t.stop());
        const blob = new Blob(chunks, { type: mediaRecorder.mimeType || "audio/webm" });
        submit(blob);
      };
      mediaRecorder.start();
      recording = true;
      els.recBtn.classList.add("recording");
      els.hint.textContent = "Recording… tap to stop";
    } catch (e) {
      showError("Microphone access denied. Please allow it and try again.");
    }
  }

  function stopRecording() {
    if (mediaRecorder && recording) {
      mediaRecorder.stop();
      recording = false;
      els.recBtn.classList.remove("recording");
      els.hint.textContent = "Tap to record";
    }
  }

  async function submit(blob) {
    const word = els.word.value.trim();
    if (!word) { showError("Please enter a word to practice."); return; }

    els.recBtn.disabled = true;
    showLoading(true);

    const fd = new FormData();
    fd.append("audio", blob, "recording.webm");
    fd.append("word", word);
    fd.append("language", els.lang.value);

    try {
      const res = await fetch(API + "/assess", { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) {
        showError(data.detail || "Something went wrong.");
      } else {
        renderResult(data);
      }
    } catch (e) {
      showError("Could not reach the server. Is it running?");
    } finally {
      showLoading(false);
      els.recBtn.disabled = false;
    }
  }

  function renderResult(data) {
    hideError();
    const color = COLORS[data.verdict] || COLORS.fair;

    // ring
    els.ringFg.style.stroke = color;
    els.ringFg.setAttribute("stroke-dasharray", CIRC.toFixed(2));
    els.ringFg.setAttribute("stroke-dashoffset", CIRC.toFixed(2)); // start empty
    const offset = CIRC * (1 - data.accuracy / 100);

    // verdict pill
    els.verdict.textContent = data.verdict;
    els.verdict.style.background = hexA(color, 0.15);
    els.verdict.style.color = color;

    // phonemes
    els.predPh.textContent = data.predicted_phonemes || "—";
    els.refPh.textContent = data.reference_phonemes || "—";

    els.result.classList.add("show");

    // animate ring + number after paint
    requestAnimationFrame(() => {
      els.ringFg.setAttribute("stroke-dashoffset", offset.toFixed(2));
      animateNumber(data.accuracy);
    });
  }

  function animateNumber(target) {
    const dur = 900;
    const start = performance.now();
    function frame(now) {
      const t = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - t, 3);
      els.scoreNum.textContent = Math.round(target * eased);
      if (t < 1) requestAnimationFrame(frame);
      else els.scoreNum.textContent = Number.isInteger(target) ? target : target.toFixed(1);
    }
    requestAnimationFrame(frame);
  }

  function hexA(color, alpha) {
    // color may be hex (#rrggbb) or rgb(...). Convert to rgba.
    const c = color.trim();
    if (c.startsWith("#")) {
      const r = parseInt(c.slice(1, 3), 16);
      const g = parseInt(c.slice(3, 5), 16);
      const b = parseInt(c.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
    if (c.startsWith("rgb")) {
      const nums = c.match(/\d+/g);
      return `rgba(${nums[0]}, ${nums[1]}, ${nums[2]}, ${alpha})`;
    }
    return c;
  }

  function showLoading(on) { els.loading.classList.toggle("show", on); }
  function showError(msg) { els.error.textContent = msg; els.error.classList.add("show"); }
  function hideError() { els.error.classList.remove("show"); }
  function hideResult() { els.result.classList.remove("show"); }

  loadLanguages();
</script>
</body>
</html>
